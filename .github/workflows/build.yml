name: Build 67 Snake Game APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Backup current lib and pubspec
        run: |
          mkdir -p backup
          cp lib/main.dart backup/main.dart.backup 2>/dev/null || true
          cp pubspec.yaml backup/pubspec.yaml.backup 2>/dev/null || true

      - name: Create Flutter project (generates missing android/ios etc)
        run: flutter create . --platforms=android --project-name=67

      - name: Restore lib and pubspec
        run: |
          cp backup/main.dart.backup lib/main.dart 2>/dev/null || true
          cp backup/pubspec.yaml.backup pubspec.yaml 2>/dev/null || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 67-snake-game-apk
          path: build/app/outputs/flutter-apk